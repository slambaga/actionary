name: "PR Greeting and Analysis"

on:
  pull_request_target:
    types: [opened]

jobs:
  analyze-and-greet:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Greet Contributor
        env:
          SECRET_TOKEN: ${{ secrets.SECRET_TOKEN }}
        run: |
          echo "Processing a new PR titled: ${{ github.event.pull_request.title }}"
          echo "Generating automated welcome message..."

      - name: Redact PR Title
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Cleaning up PR title for privacy..."
          gh pr edit "$PR_NUMBER" --title "[REDACTED FOR PRIVACY]"
