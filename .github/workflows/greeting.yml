name: "PR Greeting and Analysis"

on:
  pull_request_target:
    types: [opened]

jobs:
  analyze-and-greet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Greet Contributor
        env:
          TOKEN: ${{ secrets.SECRET_TOKEN }}
        run: |
          echo "Processing a new PR titled: ${{ github.event.pull_request.title }}"
          echo "Generating automated welcome message..."
